<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 安全扫描器 - 免费 RAG 系统安全检测</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        /* 输入区域 */
        .input-section {
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .input-hint {
            color: #999;
            font-size: 12px;
            margin-bottom: 8px;
        }
        #inputBox {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: 'Monaco', 'Consolas', monospace;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }
        #inputBox:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 解析预览区域 */
        .preview-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        .preview-title {
            color: #333;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .preview-title .icon {
            color: #667eea;
        }
        .preview-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }
        .preview-row:last-child {
            margin-bottom: 0;
        }
        .preview-label {
            color: #666;
            font-size: 14px;
            min-width: 70px;
        }
        .preview-value {
            color: #333;
            font-size: 14px;
            font-weight: 500;
        }
        .preview-value.url {
            color: #667eea;
            word-break: break-all;
        }

        /* 参数选择下拉 */
        #paramSelect {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        #paramSelect:focus {
            outline: none;
            border-color: #667eea;
        }
        #customParam {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            width: 120px;
            display: none;
        }
        #customParam:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 认证输入 */
        #authToken {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            width: 300px;
            display: none;
        }
        #authToken:focus {
            outline: none;
            border-color: #667eea;
        }
        .auth-from-curl {
            color: #38a169;
            font-size: 12px;
        }
        .auth-needed {
            color: #dd6b20;
            font-size: 12px;
        }

        /* 扫描按钮 */
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-bottom: 20px;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 进度区域 */
        .progress-container {
            margin-bottom: 20px;
            display: none;
        }
        .progress-bar {
            height: 24px;
            background: #f0f0f0;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            width: 0%;
        }
        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        /* 结果区域 */
        .result-container {
            display: none;
        }
        .score-card {
            text-align: center;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .score-number {
            font-size: 72px;
            font-weight: bold;
        }
        .score-level {
            font-size: 24px;
            margin-top: 10px;
            color: #666;
        }
        .vulnerabilities {
            margin-bottom: 20px;
        }
        .vuln-item {
            padding: 16px;
            background: #fff5f5;
            border-left: 4px solid #fc8181;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        .vuln-item.critical { border-left-color: #c53030; background: #fff5f5; }
        .vuln-item.high { border-left-color: #dd6b20; background: #fffaf0; }
        .vuln-item.medium { border-left-color: #d69e2e; background: #fffff0; }
        .vuln-item.low { border-left-color: #38a169; background: #f0fff4; }
        .vuln-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .vuln-name {
            font-weight: 600;
            color: #333;
        }
        .vuln-severity {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .severity-critical { background: #fed7d7; color: #c53030; }
        .severity-high { background: #feebc8; color: #c05621; }
        .severity-medium { background: #fefcbf; color: #975a16; }
        .severity-low { background: #c6f6d5; color: #276749; }
        .download-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        /* 功能展示 */
        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }
        .features h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }
        .feature-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
        }
        .feature-icon { font-size: 24px; margin-bottom: 6px; }
        .feature-name { font-weight: 600; color: #333; }

        /* 错误提示 */
        .error-msg {
            color: #e53e3e;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }

        /* 输入类型指示 */
        .input-type-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }
        .input-type-badge.curl {
            background: #c6f6d5;
            color: #276749;
        }
        .input-type-badge.url {
            background: #bee3f8;
            color: #2b6cb0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>RAG 安全扫描器</h1>
        <p class="subtitle">粘贴 curl 命令或输入 URL，一键检测 RAG 系统安全漏洞</p>

        <!-- 输入区域 -->
        <div class="input-section">
            <label class="input-label">目标地址</label>
            <p class="input-hint">支持直接粘贴 curl 命令（推荐）或输入 URL</p>
            <textarea id="inputBox"
                      placeholder="示例1 (curl): curl 'https://api.example.com/chat' -H 'Authorization: Bearer xxx' -d '{"query":"hello"}'

示例2 (URL): https://api.example.com/chat"></textarea>
            <p class="error-msg" id="errorMsg"></p>
        </div>

        <!-- 解析预览区域 -->
        <div class="preview-section" id="previewSection">
            <div class="preview-title">
                <span class="icon">&#128269;</span>
                解析结果
                <span class="input-type-badge" id="inputTypeBadge"></span>
            </div>

            <div class="preview-row">
                <span class="preview-label">URL:</span>
                <span class="preview-value url" id="parsedUrl">-</span>
            </div>

            <div class="preview-row">
                <span class="preview-label">Method:</span>
                <span class="preview-value" id="parsedMethod">POST</span>
            </div>

            <div class="preview-row">
                <span class="preview-label">参数名:</span>
                <select id="paramSelect">
                    <option value="query">query</option>
                    <option value="prompt">prompt</option>
                    <option value="message">message</option>
                    <option value="input">input</option>
                    <option value="question">question</option>
                    <option value="custom">自定义...</option>
                </select>
                <input type="text" id="customParam" placeholder="输入参数名">
            </div>

            <div class="preview-row">
                <span class="preview-label">认证:</span>
                <span class="preview-value" id="parsedAuth">-</span>
                <input type="text" id="authToken" placeholder="输入 Bearer Token...">
                <span class="auth-from-curl" id="authFromCurl"></span>
            </div>
        </div>

        <!-- 扫描按钮 -->
        <button class="btn" id="submitBtn" onclick="startScan()">开始安全扫描</button>

        <!-- 进度区域 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">初始化中...</p>
        </div>

        <!-- 结果区域 -->
        <div class="result-container" id="resultContainer">
            <div class="score-card">
                <div class="score-number" id="scoreNumber">--</div>
                <div class="score-level" id="scoreLevel">--</div>
            </div>

            <div class="vulnerabilities" id="vulnerabilities"></div>

            <a href="#" class="download-btn" id="downloadBtn">下载 PDF 报告</a>
        </div>

        <!-- 功能展示 -->
        <div class="features">
            <h3>10 项安全检测</h3>
            <div class="feature-grid">
                <div class="feature-item"><div class="feature-icon">&#128140;</div><div class="feature-name">提示词注入</div></div>
                <div class="feature-item"><div class="feature-icon">&#128274;</div><div class="feature-name">数据泄露</div></div>
                <div class="feature-item"><div class="feature-icon">&#128196;</div><div class="feature-name">向量注入</div></div>
                <div class="feature-item"><div class="feature-icon">&#127919;</div><div class="feature-name">检索污染</div></div>
                <div class="feature-item"><div class="feature-icon">&#128273;</div><div class="feature-name">权限绕过</div></div>
                <div class="feature-item"><div class="feature-icon">&#128202;</div><div class="feature-name">API 滥用</div></div>
                <div class="feature-item"><div class="feature-icon">&#128221;</div><div class="feature-name">日志泄露</div></div>
                <div class="feature-item"><div class="feature-icon">&#129302;</div><div class="feature-name">模型越狱</div></div>
                <div class="feature-item"><div class="feature-icon">&#128230;</div><div class="feature-name">依赖漏洞</div></div>
                <div class="feature-item"><div class="feature-icon">&#9881;</div><div class="feature-name">配置错误</div></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script>
        const socket = io();
        let currentTaskId = null;
        let parsedData = null;
        let debounceTimer = null;

        // 输入框变化时自动解析
        document.getElementById('inputBox').addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => parseInput(e.target.value), 300);
        });

        // 参数选择变化
        document.getElementById('paramSelect').addEventListener('change', (e) => {
            const customInput = document.getElementById('customParam');
            customInput.style.display = e.target.value === 'custom' ? 'inline-block' : 'none';
        });

        // 解析输入内容
        async function parseInput(input) {
            input = input.trim();
            const previewSection = document.getElementById('previewSection');
            const errorMsg = document.getElementById('errorMsg');
            const inputTypeBadge = document.getElementById('inputTypeBadge');

            errorMsg.style.display = 'none';

            if (!input) {
                previewSection.style.display = 'none';
                parsedData = null;
                return;
            }

            // curl 命令
            if (input.toLowerCase().startsWith('curl ')) {
                inputTypeBadge.textContent = 'curl';
                inputTypeBadge.className = 'input-type-badge curl';

                try {
                    const res = await fetch('/api/v1/scan/parse-curl', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ curl: input })
                    });
                    const data = await res.json();

                    if (data.code === 0) {
                        parsedData = data.data;
                        parsedData.inputType = 'curl';
                        parsedData.rawInput = input;

                        document.getElementById('parsedUrl').textContent = data.data.url;
                        document.getElementById('parsedMethod').textContent = data.data.method;

                        // 设置参数名
                        const paramSelect = document.getElementById('paramSelect');
                        const paramOptions = paramSelect.options;
                        let found = false;
                        for (let i = 0; i < paramOptions.length; i++) {
                            if (paramOptions[i].value === data.data.param_name) {
                                paramSelect.value = data.data.param_name;
                                found = true;
                                break;
                            }
                        }
                        if (!found && data.data.param_name) {
                            // 自定义参数名
                            paramSelect.value = 'custom';
                            document.getElementById('customParam').value = data.data.param_name;
                            document.getElementById('customParam').style.display = 'inline-block';
                        }

                        // 认证信息
                        const authTokenInput = document.getElementById('authToken');
                        const parsedAuthSpan = document.getElementById('parsedAuth');
                        const authFromCurl = document.getElementById('authFromCurl');

                        if (data.data.auth_header) {
                            parsedAuthSpan.textContent = data.data.auth_header;
                            authTokenInput.style.display = 'none';
                            authFromCurl.textContent = '(已从 curl 解析)';
                            authFromCurl.className = 'auth-from-curl';
                        } else {
                            parsedAuthSpan.textContent = '(无)';
                            authTokenInput.style.display = 'inline-block';
                            authFromCurl.textContent = '(需手动输入)';
                            authFromCurl.className = 'auth-needed';
                        }

                        previewSection.style.display = 'block';
                    } else {
                        errorMsg.textContent = 'curl 解析失败: ' + data.message;
                        errorMsg.style.display = 'block';
                        previewSection.style.display = 'none';
                    }
                } catch (e) {
                    errorMsg.textContent = '解析请求失败: ' + e.message;
                    errorMsg.style.display = 'block';
                    previewSection.style.display = 'none';
                }
            }
            // URL
            else if (input.startsWith('http://') || input.startsWith('https://')) {
                inputTypeBadge.textContent = 'URL';
                inputTypeBadge.className = 'input-type-badge url';

                parsedData = {
                    url: input,
                    method: 'POST',
                    inputType: 'url',
                    rawInput: input,
                    param_name: 'query',
                    auth_header: null
                };

                document.getElementById('parsedUrl').textContent = input;
                document.getElementById('parsedMethod').textContent = 'POST';
                document.getElementById('paramSelect').value = 'query';
                document.getElementById('customParam').style.display = 'none';

                // URL 需要手动输入认证
                document.getElementById('parsedAuth').textContent = '(需配置)';
                document.getElementById('authToken').style.display = 'inline-block';
                document.getElementById('authToken').value = '';
                document.getElementById('authFromCurl').textContent = '(未检测到认证)';
                document.getElementById('authFromCurl').className = 'auth-needed';

                previewSection.style.display = 'block';
            }
            // 无效输入
            else {
                errorMsg.textContent = '请输入有效的 URL 或 curl 命令';
                errorMsg.style.display = 'block';
                previewSection.style.display = 'none';
                parsedData = null;
            }
        }

        // 开始扫描
        async function startScan() {
            if (!parsedData) {
                await parseInput(document.getElementById('inputBox').value);
                if (!parsedData) return;
            }

            // 获取最终参数名
            let paramName = document.getElementById('paramSelect').value;
            if (paramName === 'custom') {
                paramName = document.getElementById('customParam').value.trim();
                if (!paramName) {
                    alert('请输入自定义参数名');
                    return;
                }
            }

            // 获取认证 token (如果是 URL 模式)
            let authToken = null;
            if (parsedData.inputType === 'url') {
                authToken = document.getElementById('authToken').value.trim();
            }

            // 重置 UI
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '提交任务...';

            try {
                const requestBody = {
                    target_value: parsedData.rawInput,
                    target_type: parsedData.inputType,
                    param_name: paramName,
                    step: 1
                };

                // URL 模式添加认证
                if (parsedData.inputType === 'url' && authToken) {
                    requestBody.auth_token = authToken;
                }

                const response = await fetch('/api/v1/scan/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();

                if (data.code === 0) {
                    currentTaskId = data.data.task_id;
                    document.getElementById('progressText').textContent = '扫描进行中...';
                    socket.emit('subscribe', { task_id: currentTaskId });
                } else {
                    alert('提交失败: ' + data.message);
                    document.getElementById('submitBtn').disabled = false;
                    document.getElementById('progressContainer').style.display = 'none';
                }
            } catch (error) {
                alert('网络错误: ' + error.message);
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('progressContainer').style.display = 'none';
            }
        }

        // WebSocket 进度更新
        socket.on('progress', (data) => {
            if (data.task_id === currentTaskId) {
                document.getElementById('progressFill').style.width = data.progress + '%';
                document.getElementById('progressText').textContent =
                    '检测中: ' + data.current_step + ' (' + data.progress + '%)';
            }
        });

        socket.on('status', (data) => {
            if (data.task_id === currentTaskId) {
                if (data.status === 'completed') {
                    document.getElementById('progressText').textContent = '扫描完成!';
                    document.getElementById('submitBtn').disabled = false;
                    loadResult(currentTaskId);
                } else if (data.status === 'failed') {
                    document.getElementById('progressText').textContent =
                        '扫描失败: ' + (data.error || '未知错误');
                    document.getElementById('submitBtn').disabled = false;
                }
            }
        });

        // 加载结果
        async function loadResult(taskId) {
            try {
                const response = await fetch('/api/v1/scan/' + taskId + '/result');
                const data = await response.json();

                if (data.code === 0) {
                    displayResult(data.data);
                }
            } catch (error) {
                console.error('加载结果失败:', error);
            }
        }

        // 显示结果
        function displayResult(result) {
            document.getElementById('resultContainer').style.display = 'block';
            document.getElementById('progressContainer').style.display = 'none';

            const scoreEl = document.getElementById('scoreNumber');
            const levelEl = document.getElementById('scoreLevel');

            scoreEl.textContent = result.score;
            scoreEl.style.color = getScoreColor(result.score);

            const levelText = { high: '高风险', medium: '中风险', low: '低风险' };
            levelEl.textContent = levelText[result.level] || '未知风险';

            const vulnContainer = document.getElementById('vulnerabilities');
            vulnContainer.innerHTML = '';

            if (result.vulnerabilities && result.vulnerabilities.length > 0) {
                result.vulnerabilities.forEach(vuln => {
                    const vulnEl = document.createElement('div');
                    vulnEl.className = 'vuln-item ' + vuln.severity;
                    vulnEl.innerHTML =
                        '<div class="vuln-header">' +
                            '<span class="vuln-name">' + escapeHtml(vuln.name) + '</span>' +
                            '<span class="vuln-severity severity-' + escapeHtml(vuln.severity) + '">' +
                                getSeverityText(vuln.severity) +
                            '</span>' +
                        '</div>' +
                        '<div>' + escapeHtml(vuln.description) + '</div>' +
                        '<div style="margin-top: 8px; color: #666; font-size: 14px;">' +
                            '&#128161; ' + escapeHtml(vuln.suggestion) +
                        '</div>';
                    vulnContainer.appendChild(vulnEl);
                });
            } else {
                vulnContainer.innerHTML = '<p style="text-align: center; color: #666;">&#127881; 未发现安全漏洞!</p>';
            }

            document.getElementById('downloadBtn').href = '/api/v1/report/generate?task_id=' + result.task_id;
        }

        // 工具函数
        function escapeHtml(text) {
            if (typeof text !== 'string') return text;
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function getScoreColor(score) {
            if (score >= 90) return '#38a169';
            if (score >= 70) return '#d69e2e';
            return '#e53e3e';
        }

        function getSeverityText(severity) {
            const map = { critical: '严重', high: '高危', medium: '中危', low: '低危' };
            return map[severity] || severity;
        }
    </script>
</body>
</html>
