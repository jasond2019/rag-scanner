<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫描报告 - RAG 安全扫描器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .summary-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        .score-display {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        .level-display {
            font-size: 20px;
            font-weight: bold;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .info-label {
            color: #666;
            margin-top: 5px;
        }
        .vulnerability-list {
            margin-top: 30px;
        }
        .vulnerability-item {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .vulnerability-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .vulnerability-title {
            font-size: 18px;
            font-weight: bold;
        }
        .vulnerability-severity {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            color: white;
        }
        .severity-critical { background: #dc3545; }
        .severity-high { background: #fd7e14; }
        .severity-medium { background: #ffc107; color: #212529; }
        .severity-low { background: #28a745; }
        .vulnerability-details {
            margin-top: 10px;
        }
        .vulnerability-description {
            margin-bottom: 10px;
            color: #555;
        }
        .vulnerability-suggestion {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-top: 20px;
            cursor: pointer;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 RAG 安全扫描报告</h1>
            <p id="report-info">报告ID: <span id="taskId">{{ task_id }}</span></p>
        </div>
        
        <div id="loading" class="loading">
            <p>正在加载报告...</p>
        </div>
        
        <div id="report-content" style="display: none;">
            <div class="summary-box">
                <div>安全评分</div>
                <div class="score-display" id="score">-</div>
                <div class="level-display" id="level">-</div>
            </div>
            
            <div class="info-grid">
                <div class="info-card">
                    <div class="info-value" id="targetValue">-</div>
                    <div class="info-label">扫描目标</div>
                </div>
                <div class="info-card">
                    <div class="info-value" id="vulnCount">-</div>
                    <div class="info-label">发现漏洞</div>
                </div>
                <div class="info-card">
                    <div class="info-value" id="scanDate">-</div>
                    <div class="info-label">扫描时间</div>
                </div>
                <div class="info-card">
                    <div class="info-value" id="scanDuration">-</div>
                    <div class="info-label">扫描耗时</div>
                </div>
            </div>
            
            <h2>检测详情</h2>
            <div id="vulnerabilityList" class="vulnerability-list">
                <!-- 漏洞列表将在这里动态生成 -->
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn" onclick="generatePdf()">📄 生成PDF报告</button>
                <button class="btn" onclick="history.back()" style="background: #6c757d; margin-left: 10px;">↩️ 返回</button>
            </div>
        </div>
    </div>
    
    <script>
        // 从URL获取任务ID
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('task_id') || '{{ task_id }}';
        
        // 加载报告数据
        async function loadReport() {
            try {
                const response = await fetch(`/api/v1/scan/result/${taskId}`);
                const data = await response.json();
                
                if (data.code === 0) {
                    displayReport(data.data);
                } else {
                    document.getElementById('loading').innerHTML = '<p>报告加载失败</p>';
                }
            } catch (error) {
                console.error('加载报告失败:', error);
                document.getElementById('loading').innerHTML = '<p>报告加载失败</p>';
            }
        }
        
        function displayReport(report) {
            // 隐藏加载状态，显示内容
            document.getElementById('loading').style.display = 'none';
            document.getElementById('report-content').style.display = 'block';
            
            // 填充基本信息
            document.getElementById('score').textContent = report.score || '-';
            document.getElementById('level').textContent = getLevelText(report.level);
            document.getElementById('targetValue').textContent = truncateText(report.target_value || '-', 40);
            document.getElementById('taskId').textContent = report.task_id || '-';
            
            // 计算漏洞数量
            const vulnerabilities = report.vulnerabilities || [];
            document.getElementById('vulnCount').textContent = vulnerabilities.length;
            
            // 设置扫描时间
            const createdAt = new Date(report.created_at);
            document.getElementById('scanDate').textContent = createdAt.toLocaleString('zh-CN');
            
            // 计算扫描耗时（如果有完成时间）
            if (report.completed_at) {
                const completedAt = new Date(report.completed_at);
                const duration = Math.round((completedAt - createdAt) / 1000);
                document.getElementById('scanDuration').textContent = `${duration}秒`;
            } else {
                document.getElementById('scanDuration').textContent = '进行中';
            }
            
            // 生成漏洞列表
            const vulnList = document.getElementById('vulnerabilityList');
            if (vulnerabilities.length === 0) {
                vulnList.innerHTML = '<div class="vulnerability-item"><p style="text-align: center; color: #28a745; font-size: 18px;">🎉 未发现安全漏洞！系统安全性良好。</p></div>';
            } else {
                let vulnHtml = '';
                vulnerabilities.forEach(vuln => {
                    vulnHtml += `
                        <div class="vulnerability-item">
                            <div class="vulnerability-header">
                                <div class="vulnerability-title">${vuln.name || '未知漏洞'}</div>
                                <span class="vulnerability-severity severity-${vuln.severity || 'low'}">
                                    ${getSeverityText(vuln.severity || 'low')}
                                </span>
                            </div>
                            <div class="vulnerability-details">
                                <div class="vulnerability-description">
                                    <strong>描述：</strong>${vuln.description || '暂无描述'}
                                </div>
                                <div class="vulnerability-suggestion">
                                    <strong>修复建议：</strong>${vuln.suggestion || '暂无修复建议'}
                                </div>
                            </div>
                        </div>
                    `;
                });
                vulnList.innerHTML = vulnHtml;
            }
        }
        
        function getLevelText(level) {
            const map = { 
                'high': '高风险', 
                'medium': '中等风险', 
                'low': '低风险',
                'critical': '极高风险'
            };
            return map[level] || level;
        }
        
        function getSeverityText(severity) {
            const map = { 
                'critical': '极高危', 
                'high': '高危', 
                'medium': '中危', 
                'low': '低危' 
            };
            return map[severity] || severity;
        }
        
        function truncateText(text, maxLength) {
            if (text.length <= maxLength) return text;
            return text.substring(0, maxLength) + '...';
        }
        
        function generatePdf() {
            // 调用后端API生成PDF报告
            window.location.href = `/api/v1/report/pdf/${taskId}`;
        }
        
        // 页面加载时获取报告数据
        document.addEventListener('DOMContentLoaded', loadReport);
    </script>
</body>
</html>
