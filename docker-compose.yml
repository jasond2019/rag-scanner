# docker-compose.yml for Scanner Project

version: '3.8'

services:
  scanner-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scanner-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///scanner.db
      - SECRET_KEY=change-this-to-a-secure-random-key
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      - redis
    networks:
      - scanner-network

  redis:
    image: redis:7-alpine
    container_name: scanner-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - scanner-network

  nginx:
    image: nginx:alpine
    container_name: scanner-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - scanner-app
    networks:
      - scanner-network

volumes:
  redis_data:

networks:
  scanner-network:
    driver: bridge