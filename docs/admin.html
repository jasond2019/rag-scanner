<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 安全扫描器 - 管理后台</title>
    <!-- GitHub Pages 子路径配置 -->
    <base href="/rag-scanner/">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <style>
        /* Admin specific styles */
        .admin-container { max-width: 1200px; }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-tab:hover { background: #e0e0e0; }
        .nav-tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value { font-size: 32px; font-weight: bold; color: #333; }
        .stat-label { font-size: 14px; color: #666; margin-top: 5px; }

        .task-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .task-table th, .task-table td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        .task-table th { background: #f8f9fa; font-weight: 600; color: #333; }
        .task-table tr:hover { background: #f8f9fa; }

        .status-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-completed { background: #c6f6d5; color: #276749; }
        .status-running { background: #bee3f8; color: #2b6cb0; }
        .status-queued { background: #fefcbf; color: #975a16; }
        .status-failed { background: #fed7d7; color: #c53030; }

        .level-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .level-critical { background: #fed7d7; color: #c53030; }
        .level-high { background: #feebc8; color: #c05621; }
        .level-medium { background: #fefcbf; color: #975a16; }
        .level-low { background: #c6f6d5; color: #276749; }

        .section-title { font-size: 18px; color: #333; margin-bottom: 15px; }

        .refresh-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .refresh-btn:hover { opacity: 0.9; }

        .loading { color: #666; text-align: center; padding: 40px; }

        .detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .detail-content {
            max-width: 800px;
            width: 90%;
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #666;
        }

        .vuln-list { margin-top: 20px; }

        .vuln-card {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .vuln-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vuln-card-name { font-weight: 600; color: #333; }

        .vuln-card-desc { font-size: 13px; color: #666; margin-top: 8px; }

        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .page-btn {
            padding: 8px 16px;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
        }

        .page-btn:hover { background: #e0e0e0; }
        .page-btn.active { background: #667eea; color: white; }
    </style>
</head>
<body>
    <div class="container admin-container">
        <h1>RAG 安全扫描器</h1>
        <p class="subtitle">管理后台 - 安全扫描仪表盘与任务管理</p>

        <!-- 导航标签 -->
        <div class="nav-tabs">
            <div class="nav-tab active" onclick="showSection('stats')">统计数据</div>
            <div class="nav-tab" onclick="showSection('tasks')">全部任务</div>
            <div class="nav-tab" onclick="showSection('in_progress')">进行中</div>
            <div class="nav-tab" onclick="showSection('logs')">审计日志</div>
        </div>

        <!-- 统计数据区域 -->
        <div id="stats-section">
            <button class="refresh-btn" onclick="loadStats()">刷新</button>
            <div class="stats-grid" id="statsGrid">
                <div class="loading">加载统计数据...</div>
            </div>

            <h3 class="section-title">风险分布</h3>
            <div class="stats-grid" id="riskGrid">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <!-- 任务列表区域 -->
        <div id="tasks-section" style="display:none;">
            <!-- 用户过滤区域 -->
            <div class="filter-bar" style="margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <label style="font-weight: 500; color: #333;">用户过滤:</label>
                <input type="text" id="userFilterInput"
                       placeholder="输入用户 ID"
                       style="padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; width: 250px; font-size: 14px;">
                <button onclick="filterByUser()" style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">
                    过滤
                </button>
                <button onclick="showMyHistory()" style="padding: 8px 16px; background: #48bb78; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">
                    查看我的记录
                </button>
                <button onclick="loadTasks()" style="padding: 8px 16px; background: #f0f0f0; color: #333; border: none; border-radius: 8px; cursor: pointer; font-size: 14px;">
                    全部任务
                </button>
            </div>
            <button class="refresh-btn" onclick="loadTasks()">刷新</button>
            <table class="task-table">
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>用户 ID</th>
                        <th>目标</th>
                        <th>状态</th>
                        <th>评分</th>
                        <th>风险等级</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tasksBody">
                    <tr><td colspan="8" class="loading">加载任务列表...</td></tr>
                </tbody>
            </table>
            <div class="pagination" id="tasksPagination"></div>
        </div>

        <!-- 进行中任务区域 -->
        <div id="in_progress-section" style="display:none;">
            <button class="refresh-btn" onclick="loadInProgress()">刷新</button>
            <table class="task-table">
                <thead>
                    <tr>
                        <th>任务 ID</th>
                        <th>目标</th>
                        <th>状态</th>
                        <th>进度</th>
                        <th>当前步骤</th>
                        <th>创建时间</th>
                    </tr>
                </thead>
                <tbody id="inProgressBody">
                    <tr><td colspan="6" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 日志区域 -->
        <div id="logs-section" style="display:none;">
            <button class="refresh-btn" onclick="loadLogs()">刷新</button>
            <table class="task-table">
                <thead>
                    <tr>
                        <th>类型</th>
                        <th>任务 ID</th>
                        <th>详情</th>
                        <th>时间</th>
                    </tr>
                </thead>
                <tbody id="logsBody">
                    <tr><td colspan="4" class="loading">加载日志...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="detail-modal" id="detailModal">
        <div class="detail-content">
            <span class="close-btn" onclick="closeDetail()">&times;</span>
            <h2 id="detailTitle">任务详情</h2>
            <div id="detailBody">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
