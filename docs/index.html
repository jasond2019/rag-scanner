<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 安全扫描器 - 免费 RAG 系统安全检测</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>RAG 安全扫描器</h1>
        <p class="subtitle">粘贴 curl 命令或输入 URL，一键检测 RAG 系统安全漏洞</p>

        <!-- 输入区域 -->
        <div class="input-section">
            <label class="input-label">目标地址</label>
            <p class="input-hint">支持直接粘贴 curl 命令（推荐）或输入 URL</p>
            <textarea id="inputBox"
                      placeholder="示例1 (curl): curl 'https://api.example.com/chat' -H 'Authorization: Bearer xxx' -d '{"query":"hello"}'

示例2 (URL): https://api.example.com/chat"></textarea>
            <p class="error-msg" id="errorMsg"></p>
        </div>

        <!-- 解析预览区域 -->
        <div class="preview-section" id="previewSection">
            <div class="preview-title">
                <span class="icon">&#128269;</span>
                解析结果
                <span class="input-type-badge" id="inputTypeBadge"></span>
            </div>

            <div class="preview-row">
                <span class="preview-label">URL:</span>
                <span class="preview-value url" id="parsedUrl">-</span>
            </div>

            <div class="preview-row">
                <span class="preview-label">Method:</span>
                <span class="preview-value" id="parsedMethod">POST</span>
            </div>

            <div class="preview-row">
                <span class="preview-label">参数名:</span>
                <select id="paramSelect">
                    <option value="query">query</option>
                    <option value="prompt">prompt</option>
                    <option value="message">message</option>
                    <option value="input">input</option>
                    <option value="question">question</option>
                    <option value="custom">自定义...</option>
                </select>
                <input type="text" id="customParam" placeholder="输入参数名">
            </div>

            <div class="preview-row">
                <span class="preview-label">认证:</span>
                <span class="preview-value" id="parsedAuth">-</span>
                <input type="text" id="authToken" placeholder="输入 Bearer Token...">
                <span class="auth-hint" id="authHint"></span>
            </div>
        </div>

        <!-- 扫描按钮 -->
        <button class="btn" id="submitBtn" onclick="startScan()">开始安全扫描</button>

        <!-- 进度区域 -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text" id="progressText">初始化中...</p>
        </div>

        <!-- 结果区域 -->
        <div class="result-container" id="resultContainer">
            <div class="score-card">
                <div class="score-number" id="scoreNumber">--</div>
                <div class="score-level" id="scoreLevel">--</div>
            </div>

            <div class="vulnerabilities" id="vulnerabilities"></div>

            <button class="download-btn" id="downloadBtn">下载 PDF 报告</button>
        </div>

        <!-- 功能展示 -->
        <div class="features">
            <h3>10 项安全检测</h3>
            <div class="feature-grid">
                <div class="feature-item"><div class="feature-icon">&#128140;</div><div class="feature-name">提示词注入</div></div>
                <div class="feature-item"><div class="feature-icon">&#128274;</div><div class="feature-name">数据泄露</div></div>
                <div class="feature-item"><div class="feature-icon">&#128196;</div><div class="feature-name">向量注入</div></div>
                <div class="feature-item"><div class="feature-icon">&#127919;</div><div class="feature-name">检索污染</div></div>
                <div class="feature-item"><div class="feature-icon">&#128273;</div><div class="feature-name">权限绕过</div></div>
                <div class="feature-item"><div class="feature-icon">&#128202;</div><div class="feature-name">API 滥用</div></div>
                <div class="feature-item"><div class="feature-icon">&#128221;</div><div class="feature-name">日志泄露</div></div>
                <div class="feature-item"><div class="feature-icon">&#129302;</div><div class="feature-name">模型越狱</div></div>
                <div class="feature-item"><div class="feature-icon">&#128230;</div><div class="feature-name">依赖漏洞</div></div>
                <div class="feature-item"><div class="feature-icon">&#9881;</div><div class="feature-name">配置错误</div></div>
            </div>
        </div>
    </div>

    <!-- pdfmake 库 - 浏览器端 PDF 生成 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>

    <!-- 应用脚本 -->
    <script src="app.js"></script>
    <script src="pdf-report.js"></script>
</body>
</html>
